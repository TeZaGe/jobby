# nginx.conf — Configuration du Reverse Proxy Nginx pour Jobby (Next.js)

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Optimisation des performances réseaux
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Sécurité globale Nginx
    server_tokens off; # Masque la version de Nginx
    
    # Sécurité des en-têtes HTTP (XSS, Clickjacking, Sniffing)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # Configuration de la compression Gzip
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream nextjs_upstream {
        # Serveur Next.js (hôte local ou nom de conteneur si Dockerized)
        server 127.0.0.1:3000;
        keepalive 64;
    }

    server {
        listen 80;
        server_name localhost; # Remplacer par le nom de domaine en production

        # Limite de taille de fichier pour les téléversements (CV/LM max 10 Mo)
        client_max_body_size 10M;

        # Logs
        access_log /var/log/nginx/jobby_access.log;
        error_log /var/log/nginx/jobby_error.log warn;

        # Proxy de toutes les requêtes vers Next.js
        location / {
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            
            # En-têtes pour le support des WebSockets (indispensable pour HMR en dev / Next.js live sync)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # En-têtes proxy standards
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Paramètres de temporisation
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Désactivation du buffering pour les réponses en continu / Server-Sent Events
            proxy_buffering off;
        }

        # Cache pour les assets statiques de Next.js
        location /_next/static/ {
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            expires 365d;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Gestion des pages d'erreur personnalisées (optionnel)
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
